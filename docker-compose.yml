version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: wallscape-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: wallscape

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wallscape-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/wallscape
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-secure-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wallscape-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000

volumes:
  mongodb_data:
  uploads_data:
